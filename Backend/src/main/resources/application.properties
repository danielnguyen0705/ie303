# Data Source
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.preparedStatementCacheQueries=0

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=false
spring.jpa.properties.hibernate.generate_statistics=false

# Mail Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Gemini
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# Cloudinary
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${API_KEY}
cloudinary.api-secret=${API_SECRET}

# Multipart upload (audio/image)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# Payments
payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:}
payment.momo.pay-url=${PAYMENT_MOMO_PAY_URL:https://test-payment.momo.vn/mock}
payment.momo.secret=${PAYMENT_MOMO_SECRET:}
payment.vnpay.pay-url=${PAYMENT_VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnpay.tmn-code=${PAYMENT_VNPAY_TMN_CODE:}
payment.vnpay.secret=${PAYMENT_VNPAY_SECRET:}
payment.bank.qr-base-url=${PAYMENT_BANK_QR_BASE_URL:https://img.vietqr.io/image}
payment.bank.bank-bin=${PAYMENT_BANK_BIN:970415}
payment.bank.account-number=${PAYMENT_BANK_ACCOUNT_NUMBER:0000000000}
payment.bank.secret=${PAYMENT_BANK_SECRET:}